<!DOCTYPE html>
<html>
<head>
    <title>რეგისტრაციის ფორმა</title>
</head>
<body>

    <h2>რეგისტრაცია</h2>

    <form>
        <label for="firstname">სახელი:</label><br>
        <input type="text" id="firstname" name="firstname" required><br><br>

        <label for="lastname">გვარი:</label><br>
        <input type="text" id="lastname" name="lastname" required><br><br>

        <label for="age">ასაკი:</label><br>
        <input type="number" id="age" name="age" required><br><br>

        <h4>აირჩიეთ ძაღლის ჯიში:</h4>

        <input type="radio" id="kokespanieli" name="dogbreed" required>
        <label for="kokespanieli">კოკესპანიალი</label><br>

        <input type="radio" id="bulldog" name="dogbreed">
        <label for="bulldog">ბულდოგი</label><br>

        <input type="radio" id="nagazi" name="dogbreed">
        <label for="nagazi">ნაგაზი</label><br>

        <input type="radio" id="pitbuli" name="dogbreed">
        <label for="pitbuli">პიტბული</label><br><br>

        
        <button type="submit">register</button>
  <label for="favoriteMovie">Select your favorite movie:</label>

  
  <select id="favoriteMovie" name="favoriteMovie">
    <option value="fast and furious">Inception</option>
    <option value="rush hour">Avatar</option>
    <option value="undisputed">Titanic</option>
    <option value="kung fu panda">Interstellar</option>
  </select>    
</body>
</html>
